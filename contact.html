  <style>
    :root {
      color-scheme: light dark;
      --bg: #f7f7fb;
      --card: #ffffff;
      --text: #1f2937;
      --muted: #6b7280;
      --accent: #2563eb;
      --accent-hover: #1d4ed8;
      --border: #e5e7eb;
    }

    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #111827;
        --card: #1f2937;
        --text: #f9fafb;
        --muted: #d1d5db;
        --accent: #60a5fa;
        --accent-hover: #93c5fd;
        --border: #374151;
      }
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI",
        "Hiragino Kaku Gothic ProN", "Hiragino Sans", Meiryo, sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.7;
    }

    .container {
      max-width: 760px;
      margin: 0 auto;
      padding: 40px 20px 64px;
    }

    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 32px 24px;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.05);
    }

    h1 {
      margin: 0 0 8px;
      font-size: 2rem;
    }

    .lead {
      margin: 0 0 32px;
      color: var(--muted);
    }

    .contact-list {
      display: grid;
      gap: 16px;
    }

    .contact-item {
      padding: 16px;
      border: 1px solid var(--border);
      border-radius: 12px;
      background: var(--card);
    }

    .contact-item h2,
    .contact-item h3 {
      margin: 0 0 8px;
      line-height: 1.4;
    }

    .contact-item h2 {
      font-size: 1.1rem;
    }

    .contact-item h3 {
      font-size: 0.95rem;
      color: var(--muted);
      margin-top: 12px;
    }

    p {
      margin: 0;
      word-break: break-word;
    }

    a {
      color: var(--accent);
      text-decoration: none;
    }

    a:hover {
      color: var(--accent-hover);
      text-decoration: underline;
    }

    .note {
      margin-top: 28px;
      padding: 16px;
      background: rgba(37, 99, 235, 0.08);
      border: 1px solid rgba(37, 99, 235, 0.22);
      border-radius: 12px;
      color: var(--text);
    }

    .meta {
      margin-top: 16px;
      color: var(--muted);
      font-size: 0.95rem;
    }

    .back-link {
      display: inline-block;
      margin-top: 28px;
      font-weight: 600;
    }

    @media (max-width: 640px) {
      .container {
        padding: 24px 16px 48px;
      }

      .card {
        padding: 24px 18px;
      }
    }
  </style>
</head>
