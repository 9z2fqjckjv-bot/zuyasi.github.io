    :root {
      --bg: #0f1115;
      --card: #171a21;
      --text: #e8ecf1;
      --muted: #a7b0be;
      --accent: #7cc7ff;
      --border: #2a3140;
      --maxw: 1100px;
      --radius: 14px;
      --space: 16px;
    }

    * { box-sizing: border-box; }
    html, body { margin: 0; padding: 0; }
    body {
      font-family: "Segoe UI", "Hiragino Kaku Gothic ProN", "Yu Gothic UI", sans-serif;
      background: linear-gradient(180deg, #0b0d12 0%, var(--bg) 100%);
      color: var(--text);
      line-height: 1.7;
    }

    .container {
      width: min(100% - 24px, var(--maxw));
      margin-inline: auto;
      padding: 28px 0 56px;
    }

    .hero {
      margin-bottom: 28px;
      padding: 20px;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      background: rgba(23, 26, 33, 0.8);
      backdrop-filter: blur(4px);
    }

    h1, h2, h3 { line-height: 1.3; margin: 0 0 10px; }
    h1 { font-size: clamp(1.5rem, 1.2rem + 1.2vw, 2.2rem); }
    h2 {
      margin-top: 34px;
      padding-bottom: 6px;
      border-bottom: 2px solid var(--border);
      font-size: clamp(1.2rem, 1rem + .8vw, 1.6rem);
      color: var(--accent);
    }
    h3 {
      margin-top: 18px;
      font-size: 1.05rem;
      color: #dce7ff;
    }

    p { margin: 0 0 10px; color: var(--muted); }

    .series {
      margin-top: 12px;
      padding: 14px;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      background: var(--card);
    }

    .video-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: var(--space);
      margin-top: 12px;
    }

    .video {
      background: #12151b;
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 8px;
    }

    .video iframe {
      width: 100%;
      aspect-ratio: 16 / 9;
      height: auto;
      border: 0;
      border-radius: 10px;
      display: block;
    }

    .note {
      margin-top: 28px;
      font-size: 0.95rem;
      color: var(--muted);
    }

    a {
      color: var(--accent);
      text-underline-offset: 3px;
    }
  </style>
