<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="description" content="zuyasi の個人サイト内の各ページへのリンク一覧です。">
  <meta name="theme-color" content="#2563eb">
  <title>サイトリンク | zuyasi</title>
  <style>
    :root {
      color-scheme: light dark;
      --bg: #f7f7f9;
      --card: #ffffff;
      --text: #1f2937;
      --muted: #6b7280;
      --accent: #2563eb;
      --accent-hover: #1d4ed8;
      --border: #e5e7eb;
    }

    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #111827;
        --card: #1f2937;
        --text: #f9fafb;
        --muted: #d1d5db;
        --accent: #60a5fa;
        --accent-hover: #93c5fd;
        --border: #374151;
      }
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI",
        "Hiragino Kaku Gothic ProN", "Hiragino Sans", Meiryo, sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.6;
    }

    .container {
      max-width: 760px;
      margin: 0 auto;
      padding: 48px 20px;
    }

    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 32px 24px;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.06);
    }

    h1 {
      margin-top: 0;
      margin-bottom: 8px;
      font-size: 2rem;
    }

    .description {
      margin: 0 0 24px;
      color: var(--muted);
    }

    .link-list {
      list-style: none;
      padding: 0;
      margin: 0;
      display: grid;
      gap: 12px;
    }

    .link-list a {
      display: block;
      text-decoration: none;
      color: var(--accent);
      background: transparent;
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 14px 16px;
      font-weight: 600;
      transition: transform 0.15s ease, border-color 0.15s ease, color 0.15s ease;
    }

    .link-list a:hover,
    .link-list a:focus-visible {
      color: var(--accent-hover);
      border-color: var(--accent);
      transform: translateY(-1px);
      outline: none;
    }

    .back-link {
      display: inline-block;
      margin-top: 24px;
      color: var(--muted);
      text-decoration: none;
    }

    .back-link:hover,
    .back-link:focus-visible {
      color: var(--accent);
      outline: none;
    }
  </style>
</head>
<body>
  <main class="container">
    <section class="card">
      <h1>サイトリンク</h1>
      <p class="description">各ページへのリンクを見やすくまとめました。</p>

      <ul class="link-list">
        <li><a href="index.html">トップページ</a></li>
        <li><a href="Acquired-certification-exams.html">取得済み資格・試験</a></li>
        <li><a href="School-&amp;-Works.html">学歴と職歴</a></li>
        <li><a href="contact.html">連絡先</a></li>
        <li><a href="https://9z2fqjckjv-bot.github.io/nanndemoya.github.io/" target="_blank" rel="noopener noreferrer">「何でも屋」公式Webサイト</a></li>
      </ul>

      <a class="back-link" href="index.html">← トップに戻る</a>
    </section>
  </main>
</body>
</html>
